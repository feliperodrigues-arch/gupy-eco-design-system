<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0}body{padding:18px 22px;font-family:var(--eco-font-sans)}
.label{font:500 10px/1 var(--eco-font-mono);color:var(--eco-text-tertiary);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font:400 13px/20px var(--eco-font-sans);background:#fff;border-radius:6px;overflow:hidden;box-shadow:var(--eco-elev-1)}
th{text-align:left;padding:12px 14px;font:600 12px/16px var(--eco-font-sans);color:var(--eco-text-secondary);background:#F3F4F7;text-transform:uppercase;letter-spacing:0.04em;border-bottom:1px solid rgba(21,23,35,0.08)}
td{padding:12px 14px;border-bottom:1px solid rgba(21,23,35,0.06);color:var(--eco-text-primary)}
tr:last-child td{border-bottom:none}
.t{display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 10px;border-radius:100px;font:500 11px/1 var(--eco-font-sans)}
.t.ok{background:#E1F7E4;color:#22592B}
.t.wait{background:#FDF1DC;color:#7C4513}
.t.no{background:#FBE3E5;color:#910F17}
.av{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font:600 11px/1 var(--eco-font-sans);background:#003CFD;margin-right:8px;vertical-align:middle}
.name{vertical-align:middle}
</style></head><body>
<table>
  <thead><tr><th>Candidato</th><th>Vaga</th><th>Etapa</th><th>Status</th></tr></thead>
  <tbody>
    <tr><td><span class="av">RS</span><span class="name">Renata Silva</span></td><td>Engenheiro Front-end</td><td>Triagem</td><td><span class="t ok">Aprovado</span></td></tr>
    <tr><td><span class="av" style="background:#7D35F8">AR</span><span class="name">André Rocha</span></td><td>Analista de RH</td><td>Entrevista</td><td><span class="t wait">Pendente</span></td></tr>
    <tr><td><span class="av" style="background:#288636">LP</span><span class="name">Lucas Pinto</span></td><td>Designer Sênior</td><td>Teste</td><td><span class="t no">Reprovado</span></td></tr>
  </tbody>
</table>
</body></html>
