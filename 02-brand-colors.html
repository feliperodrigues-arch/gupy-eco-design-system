<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0}body{padding:18px 22px;font-family:var(--eco-font-sans)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.s{border-radius:8px;overflow:hidden;border:1px solid rgba(21,23,35,0.08)}
.s .swatch{height:90px;display:flex;align-items:flex-end;padding:8px 10px}
.s .meta{padding:8px 10px;background:#fff;display:flex;justify-content:space-between;align-items:baseline}
.s .name{font:600 13px/1 var(--eco-font-sans);color:var(--eco-text-primary)}
.s .hex{font:500 11px/1 var(--eco-font-mono);color:var(--eco-text-tertiary)}
.s .role{font:500 9px/1 var(--eco-font-sans);color:#fff;letter-spacing:0.1em;text-transform:uppercase;opacity:0.85}
</style></head><body>
<div class="grid">
  <div class="s"><div class="swatch" style="background:#003CFD"><div class="role">Primary</div></div><div class="meta"><div class="name">cobalt</div><div class="hex">#003CFD</div></div></div>
  <div class="s"><div class="swatch" style="background:#CC4F28"><div class="role">Secondary</div></div><div class="meta"><div class="name">papaya</div><div class="hex">#CC4F28</div></div></div>
  <div class="s"><div class="swatch" style="background:#7D35F8"><div class="role">Highlight</div></div><div class="meta"><div class="name">lilac</div><div class="hex">#7D35F8</div></div></div>
  <div class="s"><div class="swatch" style="background:#FF5C1D"><div class="role">Extended-2</div></div><div class="meta"><div class="name">orange</div><div class="hex">#FF5C1D</div></div></div>
</div>
</body></html>
