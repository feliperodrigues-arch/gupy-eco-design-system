<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0}body{padding:20px 24px;font-family:var(--eco-font-sans)}
.stack{display:flex;flex-direction:column;gap:10px}
.line{display:flex;align-items:baseline;gap:18px}
.label{font:500 10px/1 var(--eco-font-mono);color:var(--eco-text-tertiary);width:110px;flex-shrink:0;letter-spacing:-0.01em}
.spec{font:500 10px/1 var(--eco-font-mono);color:var(--eco-text-tertiary);margin-left:auto;flex-shrink:0}
</style></head><body>
<div class="stack">
  <div class="line"><div class="label">display-large</div><div style="font:700 56px/56px var(--eco-font-sans);letter-spacing:-0.02em">Gupy</div><div class="spec">Inter 64/64 · -2%</div></div>
  <div class="line"><div class="label">display-medium</div><div style="font:700 44px/44px var(--eco-font-sans);letter-spacing:-0.02em">Eco DS</div><div class="spec">Inter 56/56 · -2%</div></div>
  <div class="line"><div class="label">display-small</div><div style="font:700 38px/40px var(--eco-font-sans);letter-spacing:-0.015em">Eco DS</div><div class="spec">Inter 48/56 · -1.5%</div></div>
</div>
</body></html>
