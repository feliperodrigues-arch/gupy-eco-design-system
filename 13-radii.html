<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0}body{padding:20px 24px;font-family:var(--eco-font-sans)}
.row{display:flex;gap:16px;align-items:flex-end}
.r{display:flex;flex-direction:column;align-items:center;gap:8px}
.r .box{width:80px;height:60px;background:var(--eco-cobalt-700);border:1px solid var(--eco-cobalt-800)}
.r .n{font:600 12px/1 var(--eco-font-sans);color:var(--eco-text-primary)}
.r .v{font:500 10px/1 var(--eco-font-mono);color:var(--eco-text-tertiary)}
.label{font:500 11px/1 var(--eco-font-sans);color:var(--eco-text-tertiary);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:14px}
</style></head><body>
<div class="label">Corner radii</div>
<div class="row">
  <div class="r"><div class="box" style="border-radius:2px"></div><div class="n">2</div><div class="v">--eco-radius-2</div></div>
  <div class="r"><div class="box" style="border-radius:4px"></div><div class="n">4 · fields</div><div class="v">--eco-radius-4</div></div>
  <div class="r"><div class="box" style="border-radius:8px"></div><div class="n">8 · dialog</div><div class="v">--eco-radius-8</div></div>
  <div class="r"><div class="box" style="border-radius:12px"></div><div class="n">12</div><div class="v">--eco-radius-12</div></div>
  <div class="r"><div class="box" style="border-radius:16px"></div><div class="n">16 · hero</div><div class="v">--eco-radius-16</div></div>
  <div class="r"><div class="box" style="border-radius:100px;width:120px;height:42px"></div><div class="n">100 · pill</div><div class="v">--eco-radius-pill</div></div>
</div>
</body></html>
