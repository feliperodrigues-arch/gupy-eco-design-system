<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0}body{padding:18px 22px;font-family:var(--eco-font-sans)}
.label{font:500 11px/1 var(--eco-font-sans);color:var(--eco-text-tertiary);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px}
.row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.s{display:flex;flex-direction:column;gap:6px}
.s .chip{height:64px;border-radius:8px;border:1px solid rgba(21,23,35,0.06)}
.s .n{font:600 12px/1 var(--eco-font-sans);color:var(--eco-text-primary)}
.s .h{font:500 10px/1 var(--eco-font-mono);color:var(--eco-text-tertiary)}
</style></head><body>
<div class="label">Chart palette · extended series</div>
<div class="row">
  <div class="s"><div class="chip" style="background:#15A39E"></div><div class="n">turquoise</div><div class="h">#15A39E</div></div>
  <div class="s"><div class="chip" style="background:#C124B0"></div><div class="n">magenta</div><div class="h">#C124B0</div></div>
  <div class="s"><div class="chip" style="background:#66AE13"></div><div class="n">lime</div><div class="h">#66AE13</div></div>
  <div class="s"><div class="chip" style="background:#6B7AB3"></div><div class="n">indigo</div><div class="h">#6B7AB3</div></div>
  <div class="s"><div class="chip" style="background:#0D79BC"></div><div class="n">lightBlue</div><div class="h">#0D79BC</div></div>
  <div class="s"><div class="chip" style="background:#E4851C"></div><div class="n">yellow</div><div class="h">#E4851C</div></div>
</div>
</body></html>
