<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0}body{padding:20px 24px;font-family:var(--eco-font-sans)}
.stack{display:flex;flex-direction:column;gap:10px}
.alert{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:4px;font:400 14px/20px var(--eco-font-sans)}
.alert .ico{font-family:"Material Symbols Rounded";font-size:22px;flex-shrink:0;line-height:20px}
.alert .body{flex:1}
.alert .title{font-weight:600;margin-bottom:2px}
.success{background:#E1F7E4;color:#22592B}
.success .ico{color:#288636}
.error{background:#FBE3E5;color:#910F17}
.error .ico{color:#BA121E}
.warn{background:#FDF1DC;color:#7C4513}
.warn .ico{color:#E4851C}
.info{background:#E8F3FA;color:#092134}
.info .ico{color:#0D79BC}
</style></head><body>
<div class="stack">
  <div class="alert success"><span class="ico">check_circle</span><div class="body"><div class="title">Vaga publicada</div>Sua vaga já está visível para candidatos.</div></div>
  <div class="alert info"><span class="ico">info</span><div class="body"><div class="title">Sincronização em andamento</div>Atualizando candidatos do Gupy ADM.</div></div>
  <div class="alert warn"><span class="ico">warning</span><div class="body"><div class="title">Atenção</div>Você tem 3 candidatos aguardando feedback há mais de 7 dias.</div></div>
  <div class="alert error"><span class="ico">error</span><div class="body"><div class="title">Falha ao salvar</div>Verifique sua conexão e tente novamente.</div></div>
</div>
</body></html>
