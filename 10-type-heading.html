<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0}body{padding:20px 24px;font-family:var(--eco-font-sans)}
.stack{display:flex;flex-direction:column;gap:14px}
.line{display:flex;align-items:baseline;gap:18px}
.label{font:500 10px/1 var(--eco-font-mono);color:var(--eco-text-tertiary);width:110px;flex-shrink:0}
.spec{font:500 10px/1 var(--eco-font-mono);color:var(--eco-text-tertiary);margin-left:auto;flex-shrink:0}
</style></head><body>
<div class="stack">
  <div class="line"><div class="label">heading-large</div><div style="font:700 36px/40px var(--eco-font-sans)">Página de vagas</div><div class="spec">Inter 40/48</div></div>
  <div class="line"><div class="label">heading-medium</div><div style="font:700 28px/32px var(--eco-font-sans)">Resumo do candidato</div><div class="spec">Inter 32/40</div></div>
  <div class="line"><div class="label">heading-small</div><div style="font:700 22px/28px var(--eco-font-sans)">Etapas seletivas</div><div class="spec">Inter 24/32</div></div>
  <div class="line"><div class="label">title-large</div><div style="font:600 19px/24px var(--eco-font-sans)">Detalhes da vaga</div><div class="spec">Inter 20/32 · 600</div></div>
  <div class="line"><div class="label">title-medium</div><div style="font:600 17px/22px var(--eco-font-sans)">Informações pessoais</div><div class="spec">Inter 18/28 · 600</div></div>
  <div class="line"><div class="label">title-small</div><div style="font:600 15px/20px var(--eco-font-sans)">Endereço</div><div class="spec">Inter 16/24 · 600</div></div>
</div>
</body></html>
