<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0}body{padding:20px 24px;font-family:var(--eco-font-sans)}
.stepper{display:flex;align-items:center;gap:0}
.step{display:flex;align-items:center;gap:10px;flex:1}
.step .dot{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font:600 13px/1 var(--eco-font-sans);background:#003CFD;color:#fff;flex-shrink:0}
.step.upcoming .dot{background:rgba(21,23,35,0.12);color:var(--eco-text-secondary)}
.step.done .dot{background:#003CFD}
.step .lbl{font:500 14px/18px var(--eco-font-sans);color:var(--eco-text-primary)}
.step.upcoming .lbl{color:var(--eco-text-tertiary)}
.bar{flex:1;height:1px;background:rgba(21,23,35,0.12);margin:0 12px}
.bar.done{background:#003CFD}
.tabs{display:flex;border-bottom:1px solid rgba(21,23,35,0.12);margin-top:24px}
.tab{padding:12px 16px;font:600 14px/1 var(--eco-font-sans);color:var(--eco-text-secondary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:#003CFD;border-color:#003CFD}
</style></head><body>
<div class="stepper">
  <div class="step done"><span class="dot">✓</span><span class="lbl">Cadastro</span></div>
  <div class="bar done"></div>
  <div class="step"><span class="dot">2</span><span class="lbl">Currículo</span></div>
  <div class="bar"></div>
  <div class="step upcoming"><span class="dot">3</span><span class="lbl">Revisão</span></div>
  <div class="bar"></div>
  <div class="step upcoming"><span class="dot">4</span><span class="lbl">Envio</span></div>
</div>
<div class="tabs">
  <div class="tab active">Resumo</div>
  <div class="tab">Candidatos</div>
  <div class="tab">Etapas</div>
  <div class="tab">Configurações</div>
</div>
</body></html>
