<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0}body{padding:30px 28px;background:#F3F4F7;font-family:var(--eco-font-sans)}
.row{display:flex;gap:24px;align-items:flex-end}
.r{display:flex;flex-direction:column;align-items:center;gap:10px}
.r .box{width:88px;height:64px;background:#fff;border-radius:6px}
.r .n{font:600 12px/1 var(--eco-font-sans)}
.r .v{font:500 10px/1 var(--eco-font-mono);color:var(--eco-text-tertiary)}
</style></head><body>
<div class="row">
  <div class="r"><div class="box" style="box-shadow:none;border:1px solid rgba(21,23,35,0.08)"></div><div class="n">elev-0</div><div class="v">flat</div></div>
  <div class="r"><div class="box" style="box-shadow:var(--eco-elev-1)"></div><div class="n">elev-1</div><div class="v">card</div></div>
  <div class="r"><div class="box" style="box-shadow:var(--eco-elev-2)"></div><div class="n">elev-2</div><div class="v">app-bar</div></div>
  <div class="r"><div class="box" style="box-shadow:var(--eco-elev-4)"></div><div class="n">elev-4</div><div class="v">menu</div></div>
  <div class="r"><div class="box" style="box-shadow:var(--eco-elev-8)"></div><div class="n">elev-8</div><div class="v">popover</div></div>
  <div class="r"><div class="box" style="box-shadow:var(--eco-elev-16)"></div><div class="n">elev-16</div><div class="v">dialog</div></div>
  <div class="r"><div class="box" style="box-shadow:var(--eco-elev-24)"></div><div class="n">elev-24</div><div class="v">drawer</div></div>
</div>
</body></html>
