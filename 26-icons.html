<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0}body{padding:22px 24px;font-family:var(--eco-font-sans)}
.row{display:flex;gap:24px;flex-wrap:wrap;align-items:center}
.ico{font-family:"Material Symbols Rounded";font-size:24px;color:var(--eco-text-primary);width:32px;text-align:center}
.ico.filled{font-variation-settings:"FILL" 1,"wght" 400,"GRAD" 0,"opsz" 24}
.ico.brand{color:#003CFD}
.ico.sm{font-size:20px}
.ico.lg{font-size:32px}
.grp{display:inline-flex;flex-direction:column;align-items:center;gap:6px}
.grp .n{font:500 10px/1 var(--eco-font-mono);color:var(--eco-text-tertiary)}
.label{font:500 10px/1 var(--eco-font-mono);color:var(--eco-text-tertiary);min-width:80px;text-transform:uppercase;letter-spacing:0.08em}
.line + .line{margin-top:14px}
.line{display:flex;align-items:center;gap:18px}
</style></head><body>
<div class="line"><div class="label">rounded</div>
  <div class="grp"><span class="ico">home</span><span class="n">home</span></div>
  <div class="grp"><span class="ico">work</span><span class="n">work</span></div>
  <div class="grp"><span class="ico">groups</span><span class="n">groups</span></div>
  <div class="grp"><span class="ico">person</span><span class="n">person</span></div>
  <div class="grp"><span class="ico">search</span><span class="n">search</span></div>
  <div class="grp"><span class="ico">notifications</span><span class="n">notif.</span></div>
  <div class="grp"><span class="ico">settings</span><span class="n">settings</span></div>
  <div class="grp"><span class="ico">favorite</span><span class="n">favorite</span></div>
</div>
<div class="line"><div class="label">filled</div>
  <div class="grp"><span class="ico filled brand">check_circle</span><span class="n">success</span></div>
  <div class="grp"><span class="ico filled" style="color:#BA121E">error</span><span class="n">error</span></div>
  <div class="grp"><span class="ico filled" style="color:#E4851C">warning</span><span class="n">warning</span></div>
  <div class="grp"><span class="ico filled" style="color:#0D79BC">info</span><span class="n">info</span></div>
  <div class="grp"><span class="ico filled" style="color:#7D35F8">auto_awesome</span><span class="n">AI</span></div>
</div>
</body></html>
