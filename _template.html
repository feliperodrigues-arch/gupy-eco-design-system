<!doctype html>
<html><head><meta charset="utf-8"><title>card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { background: transparent; }
  body { padding: 16px 20px; font-family: var(--eco-font-sans); color: var(--eco-text-primary); }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { display: flex; flex-direction: column; gap: 6px; align-items: stretch; }
  .swatch .chip { border-radius: 6px; height: 56px; border: 1px solid rgba(21,23,35,0.08); }
  .swatch .name { font: 500 11px/1.2 var(--eco-font-sans); color: var(--eco-text-primary); }
  .swatch .hex  { font: 400 10px/1.2 var(--eco-font-mono); color: var(--eco-text-tertiary); letter-spacing: -0.02em; }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; width: 100%; }
  .scale .step { aspect-ratio: 1.6 / 1; border-radius: 4px; border: 1px solid rgba(21,23,35,0.06); display: flex; flex-direction: column; justify-content: flex-end; padding: 4px 6px; }
  .scale .step .n { font: 500 9px/1 var(--eco-font-mono); }
  .label { font: 500 11px/1 var(--eco-font-sans); color: var(--eco-text-tertiary); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 8px; }
</style>
</head><body></body></html>
