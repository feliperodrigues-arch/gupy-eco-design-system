<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0}body{padding:20px 24px;background:#F3F4F7;font-family:var(--eco-font-sans)}
.bar{display:flex;align-items:center;gap:16px;padding:0 24px;height:64px;background:#fff;box-shadow:var(--eco-elev-2);border-radius:4px}
.logo{display:flex;align-items:center;gap:10px}
.logo img{width:96px;height:auto}
.divider{width:1px;height:24px;background:rgba(21,23,35,0.12)}
.crumbs{display:flex;align-items:center;gap:6px;font:400 14px/1 var(--eco-font-sans);color:var(--eco-text-secondary)}
.crumbs .now{color:var(--eco-text-primary);font-weight:600}
.crumbs .sep{font-family:"Material Symbols Rounded";font-size:18px;color:var(--eco-text-tertiary)}
.spacer{flex:1}
.icon-btn{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;cursor:pointer;color:var(--eco-text-secondary)}
.icon-btn:hover{background:rgba(21,23,35,0.04)}
.icon-btn span{font-family:"Material Symbols Rounded";font-size:22px}
.av{width:36px;height:36px;border-radius:50%;background:#003CFD;color:#fff;display:inline-flex;align-items:center;justify-content:center;font:600 13px/1 var(--eco-font-sans)}
</style></head><body>
<div class="bar">
  <div class="logo"><img src="../assets/gupy-logo-navy.png" alt=""></div>
  <div class="divider"></div>
  <div class="crumbs"><span>R&amp;S</span><span class="sep">chevron_right</span><span>Vagas</span><span class="sep">chevron_right</span><span class="now">Engenheiro Front-end</span></div>
  <div class="spacer"></div>
  <div class="icon-btn"><span>search</span></div>
  <div class="icon-btn"><span>notifications</span></div>
  <div class="icon-btn"><span>help</span></div>
  <div class="av">RS</div>
</div>
</body></html>
