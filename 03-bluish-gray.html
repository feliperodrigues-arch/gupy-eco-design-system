<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0}body{padding:18px 22px;font-family:var(--eco-font-sans)}
.label{font:500 11px/1 var(--eco-font-sans);color:var(--eco-text-tertiary);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px}
.row{display:grid;grid-template-columns:repeat(11,1fr);gap:6px}
.step{aspect-ratio:1.3/1;border-radius:6px;border:1px solid rgba(21,23,35,0.06);display:flex;flex-direction:column;justify-content:flex-end;padding:6px 7px}
.step .n{font:500 10px/1 var(--eco-font-mono)}
</style></head><body>
<div class="label">bluish-gray · the signature Eco neutral</div>
<div class="row">
  <div class="step" style="background:#F3F4F7;color:#151723"><div class="n">50</div></div>
  <div class="step" style="background:#E9EEF1;color:#151723"><div class="n">100</div></div>
  <div class="step" style="background:#DCE3E9;color:#151723"><div class="n">200</div></div>
  <div class="step" style="background:#C7CEDC;color:#151723"><div class="n">300</div></div>
  <div class="step" style="background:#AFB8CA;color:#151723"><div class="n">400</div></div>
  <div class="step" style="background:#8E99B4;color:#fff"><div class="n">500</div></div>
  <div class="step" style="background:#6A7695;color:#fff"><div class="n">600</div></div>
  <div class="step" style="background:#5C637F;color:#fff"><div class="n">700</div></div>
  <div class="step" style="background:#4B5068;color:#fff"><div class="n">800</div></div>
  <div class="step" style="background:#2E3342;color:#fff"><div class="n">900</div></div>
  <div class="step" style="background:#151723;color:#fff"><div class="n">950</div></div>
</div>
</body></html>
