<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0}body{padding:18px 22px;font-family:var(--eco-font-sans)}
.label{font:500 11px/1 var(--eco-font-sans);color:var(--eco-text-tertiary);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px}
.row{display:grid;grid-template-columns:repeat(11,1fr);gap:6px;margin-bottom:14px}
.step{aspect-ratio:1.3/1;border-radius:6px;border:1px solid rgba(21,23,35,0.06);display:flex;flex-direction:column;justify-content:flex-end;padding:6px 7px}
.step .n{font:500 10px/1 var(--eco-font-mono)}
</style></head><body>
<div class="label">cobalt · brand primary</div>
<div class="row">
  <div class="step" style="background:#F5F9FF;color:#151723"><div class="n">50</div></div>
  <div class="step" style="background:#E6F0FF;color:#151723"><div class="n">100</div></div>
  <div class="step" style="background:#C2DAFF;color:#151723"><div class="n">200</div></div>
  <div class="step" style="background:#94BDFE;color:#151723"><div class="n">300</div></div>
  <div class="step" style="background:#6699FF;color:#151723"><div class="n">400</div></div>
  <div class="step" style="background:#346AFE;color:#fff"><div class="n">500</div></div>
  <div class="step" style="background:#1660D0;color:#fff"><div class="n">600</div></div>
  <div class="step" style="background:#003CFD;color:#fff"><div class="n">700</div></div>
  <div class="step" style="background:#063BC1;color:#fff"><div class="n">800</div></div>
  <div class="step" style="background:#0B2E6F;color:#fff"><div class="n">900</div></div>
  <div class="step" style="background:#092353;color:#fff"><div class="n">950</div></div>
</div>
<div class="label">papaya · brand secondary</div>
<div class="row">
  <div class="step" style="background:#FCF4F3"><div class="n">50</div></div>
  <div class="step" style="background:#FAE8E5"><div class="n">100</div></div>
  <div class="step" style="background:#F6D0CB"><div class="n">200</div></div>
  <div class="step" style="background:#F0B6AD"><div class="n">300</div></div>
  <div class="step" style="background:#EF927B"><div class="n">400</div></div>
  <div class="step" style="background:#E47958;color:#fff"><div class="n">500</div></div>
  <div class="step" style="background:#CC4F28;color:#fff"><div class="n">600</div></div>
  <div class="step" style="background:#A94223;color:#fff"><div class="n">700</div></div>
  <div class="step" style="background:#7D331C;color:#fff"><div class="n">800</div></div>
  <div class="step" style="background:#592718;color:#fff"><div class="n">900</div></div>
  <div class="step" style="background:#441A0E;color:#fff"><div class="n">950</div></div>
</div>
</body></html>
