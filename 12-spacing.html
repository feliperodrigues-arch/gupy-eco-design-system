<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0}body{padding:20px 24px;font-family:var(--eco-font-sans)}
.row{display:flex;align-items:flex-end;gap:8px;margin-top:14px}
.tok{display:flex;flex-direction:column;align-items:center;gap:6px;flex:0 0 auto}
.bar{background:var(--eco-cobalt-700);border-radius:2px;width:24px}
.tok .n{font:500 10px/1 var(--eco-font-mono);color:var(--eco-text-tertiary)}
.tok .v{font:500 10px/1 var(--eco-font-mono);color:var(--eco-text-primary)}
.label{font:500 11px/1 var(--eco-font-sans);color:var(--eco-text-tertiary);letter-spacing:0.08em;text-transform:uppercase}
</style></head><body>
<div class="label">Spacing scale · 4 px base</div>
<div class="row">
  <div class="tok"><div class="bar" style="height:2px"></div><div class="n">quark</div><div class="v">2</div></div>
  <div class="tok"><div class="bar" style="height:4px"></div><div class="n">nano</div><div class="v">4</div></div>
  <div class="tok"><div class="bar" style="height:8px"></div><div class="n">xxxs</div><div class="v">8</div></div>
  <div class="tok"><div class="bar" style="height:12px"></div><div class="n">xxs</div><div class="v">12</div></div>
  <div class="tok"><div class="bar" style="height:16px"></div><div class="n">xs</div><div class="v">16</div></div>
  <div class="tok"><div class="bar" style="height:20px"></div><div class="n">sm</div><div class="v">20</div></div>
  <div class="tok"><div class="bar" style="height:24px"></div><div class="n">md</div><div class="v">24</div></div>
  <div class="tok"><div class="bar" style="height:32px"></div><div class="n">lg</div><div class="v">32</div></div>
  <div class="tok"><div class="bar" style="height:40px"></div><div class="n">xl</div><div class="v">40</div></div>
  <div class="tok"><div class="bar" style="height:48px"></div><div class="n">xxl</div><div class="v">48</div></div>
  <div class="tok"><div class="bar" style="height:64px"></div><div class="n">xxxl</div><div class="v">64</div></div>
  <div class="tok"><div class="bar" style="height:80px"></div><div class="n">huge</div><div class="v">80</div></div>
</div>
</body></html>
