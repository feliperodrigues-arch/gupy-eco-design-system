<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0}body{padding:20px 24px;background:#F3F4F7;font-family:var(--eco-font-sans)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:#fff;border-radius:4px;box-shadow:var(--eco-elev-1);padding:20px}
.head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.title{font:600 20px/24px var(--eco-font-sans);color:var(--eco-text-primary)}
.subtitle{font:400 13px/18px var(--eco-font-sans);color:var(--eco-text-secondary)}
.meta{display:flex;gap:6px;margin-top:12px}
.tag{font:500 11px/14px var(--eco-font-sans);padding:2px 8px;border-radius:100px;background:rgba(21,23,35,0.08)}
.tag.ok{background:#E1F7E4;color:#22592B}
.btn{display:inline-flex;height:32px;padding:0 14px;border-radius:100px;background:#003CFD;color:#fff;font:500 13px/1 "Roboto";align-items:center;border:none;margin-top:14px}
.avatar{width:40px;height:40px;border-radius:50%;background:#7D35F8;color:#fff;display:flex;align-items:center;justify-content:center;font:600 14px/1 var(--eco-font-sans)}
</style></head><body>
<div class="row">
  <div class="card">
    <div class="head">
      <div><div class="title">Engenheiro Front-end</div><div class="subtitle">São Paulo · Híbrido · CLT</div></div>
      <div class="avatar">RS</div>
    </div>
    <div class="meta"><span class="tag ok">Ativa</span><span class="tag">128 candidatos</span></div>
    <button class="btn">Ver vaga</button>
  </div>
  <div class="card">
    <div class="head">
      <div><div class="title">Analista de RH</div><div class="subtitle">Remoto · PJ · Pleno</div></div>
      <div class="avatar" style="background:#288636">AR</div>
    </div>
    <div class="meta"><span class="tag ok">Ativa</span><span class="tag">42 candidatos</span></div>
    <button class="btn">Ver vaga</button>
  </div>
</div>
</body></html>
