<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{background:transparent;margin:0}body{padding:18px 22px;font-family:var(--eco-font-sans)}
.label{font:500 11px/1 var(--eco-font-sans);color:var(--eco-text-tertiary);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px}
.row{display:grid;grid-template-columns:repeat(11,1fr);gap:6px;margin-bottom:14px}
.step{aspect-ratio:1.3/1;border-radius:6px;border:1px solid rgba(21,23,35,0.06);display:flex;flex-direction:column;justify-content:flex-end;padding:6px 7px}
.step .n{font:500 10px/1 var(--eco-font-mono)}
</style></head><body>
<div class="label">lilac · brand highlight (AI / feature flags)</div>
<div class="row">
  <div class="step" style="background:#F6F4FF"><div class="n">50</div></div>
  <div class="step" style="background:#E4DDFF"><div class="n">100</div></div>
  <div class="step" style="background:#D7CDFF"><div class="n">200</div></div>
  <div class="step" style="background:#BEA5FF"><div class="n">300</div></div>
  <div class="step" style="background:#9F8AFF"><div class="n">400</div></div>
  <div class="step" style="background:#8751FB;color:#fff"><div class="n">500</div></div>
  <div class="step" style="background:#7D35F8;color:#fff"><div class="n">600</div></div>
  <div class="step" style="background:#6B20D5;color:#fff"><div class="n">700</div></div>
  <div class="step" style="background:#52139A;color:#fff"><div class="n">800</div></div>
  <div class="step" style="background:#370E62;color:#fff"><div class="n">900</div></div>
  <div class="step" style="background:#28084A;color:#fff"><div class="n">950</div></div>
</div>
<div class="label">orange · brand extended-2 / charts</div>
<div class="row">
  <div class="step" style="background:#FFF7F0"><div class="n">50</div></div>
  <div class="step" style="background:#FFE9D6"><div class="n">100</div></div>
  <div class="step" style="background:#FED0AF"><div class="n">200</div></div>
  <div class="step" style="background:#FDA772"><div class="n">300</div></div>
  <div class="step" style="background:#F87F4F"><div class="n">400</div></div>
  <div class="step" style="background:#FF5C1D;color:#fff"><div class="n">500</div></div>
  <div class="step" style="background:#D34317;color:#fff"><div class="n">600</div></div>
  <div class="step" style="background:#B63920;color:#fff"><div class="n">700</div></div>
  <div class="step" style="background:#832B20;color:#fff"><div class="n">800</div></div>
  <div class="step" style="background:#501E16;color:#fff"><div class="n">900</div></div>
  <div class="step" style="background:#3A120D;color:#fff"><div class="n">950</div></div>
</div>
</body></html>
